targets:
  dev:
    permissions:
      - group_name: engenheiro_dados
        level: CAN_MANAGE
    variables:
      storage_account: adlsdatalakedeveastus
      git_branch: feature/primeiro-job
    presets:
      name_prefix: (dev ${workspace.current_user.short_name})
      trigger_pause_status: PAUSED
  
  qa:
    permissions:
      - service_principal_name: ${var.service_principal_id}
        level: CAN_MANAGE
      - group_name: engenheiro_dados
        level: CAN_RUN
      - group_name: engenheiro_dados
        level: CAN_VIEW 
    variables:
      storage_account: adlsdatalakeqaeastus
      git_branch: qa
      service_principal_name: sp-qa-databricks
    presets:
      trigger_pause_status: PAUSED
    
  prod:
    permissions:
      - service_principal_name: ${var.service_principal_id}
        level: CAN_MANAGE
      - group_name: engenheiro_dados
        level: CAN_VIEW
    variables:
      storage_account: adlsdatalakeprodeastus
      git_branch: main
      service_principal_name: sp-prod-databricks
    presets:
        trigger_pause_status: UNPAUSED
