targets:
  dev:
    permissions:
      - group_name: engenheiro_dados
        level: CAN_MANAGE
    variables:
      storage_account: adlsdatalakedeveastus
      git_branch: feature/primeiro-job
    presets:
      name_prefix: (dev ${workspace.current_user.short_name})
      trigger_pause_status: PAUSED
  
  qa:
    permissions:
      - group_name: engenheiro_dados
        level: CAN_RUN
      - group_name: engenheiro_dados
        level: CAN_VIEW 
    variables:
      storage_account: adlsdatalakeqaeastus
      git_branch: qa
    presets:
      trigger_pause_status: PAUSED
    
  prod:
    permissions:
      - group_name: data_engineer_gp
        level: CAN_VIEW
    variables:
      storage_account: adlsdatalakeprodeastus
      git_branch: main
    presets:
        trigger_pause_status: UNPAUSED