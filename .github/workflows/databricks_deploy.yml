name: Databricks Bundle Deploy

on:
  push:
    branches:
      - qa
      - main
    paths:
      - "databricks.yml"
      - "**/*.yml"
      - "**/*.py"
      - "**/*.sql"
      - ".github/workflows/databricks-deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/qa' || github.ref == 'refs/heads/main'

    env:
      DATABRICKS_CFG_QA: ${{ secrets.DATABRICKS_CFG_QA }}
      DATABRICKS_CFG_PRD: ${{ secrets.DATABRICKS_CFG_PRD }}
      DATABRICKS_CONFIG_FILE: .databrickscfg

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Configure Databricks Profile
        run: |
          BRANCH="${GITHUB_REF##*/}"
          if [ "$BRANCH" = "qa" ]; then
            echo "${DATABRICKS_CFG_QA}" > .databrickscfg
            echo "TARGET=qa" >> $GITHUB_ENV
          else
            echo "${DATABRICKS_CFG_PRD}" > .databrickscfg
            echo "TARGET=prod" >> $GITHUB_ENV
          fi

      - name: Validate Bundle
        run: databricks bundle validate -t $TARGET -p $TARGET

      - name: Deploy Bundle
        run: databricks bundle deploy -t $TARGET -p $TARGET
